<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 도서 목록</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>
<div class="admin-container">

    <!-- 헤더 -->
    <div class="admin-header">
        <h1>📚 관리자 도서 목록</h1>
        <a th:href="@{/admin/books/naver}" class="btn-primary small">
            ➕ 네이버 도서 등록
        </a>
    </div>

    <!-- 도서 없음 -->
    <div th:if="${#lists.isEmpty(books)}" class="admin-empty">
        등록된 도서가 없습니다.
    </div>

    <!-- 도서 목록 -->
    <div class="admin-list">

        <div th:each="book : ${books}" class="admin-row">

            <div class="admin-row-title">
                📖 <span th:text="${book.title}"></span>
            </div>

            <div class="admin-row-user">
                👤 <span th:text="${book.author}"></span>
            </div>

            <div class="admin-row-user">
                🏢 <span th:text="${book.publisher}"></span>
            </div>

            <div class="admin-row-user">
                ISBN: <span th:text="${book.isbn}"></span>
            </div>

            <div class="admin-row-status"
                 th:text="${book.available ? '대여 가능' : '대여 중'}"
                 th:classappend="${book.available} ? ' done' : ' active'">
            </div>

        </div>

    </div>

</div>
</body>
</html>
