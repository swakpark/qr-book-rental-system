<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>책 QR 인쇄</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="admin-container">

    <!-- 화면용 헤더 (인쇄 시 숨김) -->
    <div class="admin-header print-hide">
        <h1>📘 책 QR 코드</h1>
        <a th:href="@{/admin/dashboard}" class="btn-gray small">
            ← 관리자 허브
        </a>
    </div>

    <div class="card print-hide muted">
        📱 책 QR을 스캔하면 해당 도서를 대여/반납할 수 있습니다.
    </div>

    <!-- 인쇄 영역 -->
    <div class="qr-print-grid">

        <div class="qr-box" th:each="book : ${books}">
            <img th:src="@{'/static-qr/books/book_' + ${book.id} + '.png'}"
                 alt="QR 코드">

            <div class="qr-label">📘 도서 대여 QR</div>

            <div class="qr-title"
                 th:text="${book.title}">
            </div>
        </div>

    </div>

</div>

</body>
</html>
