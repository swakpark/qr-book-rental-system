<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>테이블 QR 인쇄</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="admin-container">

    <!-- 화면용 헤더 (인쇄 시 숨김) -->
    <div class="admin-header print-hide">
        <h1>🪑 테이블 QR 코드</h1>
        <a th:href="@{/admin/dashboard}" class="btn-gray small">
            ← 관리자 허브
        </a>
    </div>

    <div class="card print-hide muted">
        📱 테이블 QR을 스캔하면 도서관 서비스를 이용할 수 있습니다.<br>
        (도서 검색 · 챗봇 · 내 대여 목록 · 관리자 문의 등)
    </div>

    <!-- 인쇄 영역 -->
    <div class="qr-table-grid">

        <div class="qr-box"
             th:each="i : ${#numbers.sequence(1, tableCount)}">

            <img th:src="@{'/static-qr/tables/table_' + ${i} + '.png'}"
                 alt="테이블 QR">

            <div class="qr-table-label">
                📱 도서관 이용 QR
            </div>

            <div class="qr-table-hint">
                테이블 [[${i}]]
            </div>

        </div>

    </div>

</div>
</body>
</html>
