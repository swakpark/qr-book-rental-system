<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>대여 목록</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>
<body>

<div class="admin-container">

    <!-- 헤더 -->
    <div class="admin-header">
        <h1>📚 도서 대여 목록</h1>
        <a th:href="@{/admin/dashboard}" class="btn-gray small">
            ← 관리자 허브
        </a>
    </div>

    <!-- 대여 없음 -->
    <div th:if="${#lists.isEmpty(loans)}" class="admin-empty">
        현재 대여 중인 도서가 없습니다.
    </div>

    <!-- 목록 -->
    <div class="admin-list">

        <div th:each="loan : ${loans}" class="admin-row">

            <div class="admin-row-title">
                <a th:href="@{/admin/view/{id}(id=${loan.book.id})}">
                    <span th:text="${loan.book.title}"></span>
                </a>
            </div>

            <div class="admin-row-user">
                👤 <span th:text="${loan.user.name}"></span>
            </div>

            <div class="admin-row-status"
                 th:text="${loan.returned ? '반납 완료' : '대여 중'}"
                 th:classappend="${loan.returned} ? ' done' : ' active'">
            </div>

        </div>

    </div>

</div>
</body>
</html>
