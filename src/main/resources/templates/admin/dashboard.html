<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="admin-container">

    <!-- 헤더 -->
    <div class="admin-header">
        <h1>🛠 관리자 허브</h1>
        <a th:href="@{/qr/entry}" class="back-link">⬅️ 홈 화면</a>
    </div>

    <!-- 그리드 -->
    <div class="admin-grid">

        <a th:href="@{/admin/view/loans}" class="admin-card">
            <div class="admin-icon">📚</div>
            <div class="admin-title">대여 목록</div>
            <div class="admin-desc">현재 대여 중인 도서 확인</div>
        </a>

        <a th:href="@{/admin/books/naver}" class="admin-card">
            <div class="admin-icon">🔍</div>
            <div class="admin-title">도서 등록</div>
            <div class="admin-desc">네이버 API로 도서 추가</div>
        </a>

        <a th:href="@{/admin/inquiries}" class="admin-card">
            <div class="admin-icon">❓</div>
            <div class="admin-title">미처리 문의</div>
            <div class="admin-desc">답변되지 않은 문의</div>
        </a>

        <a th:href="@{/admin/inquiries/all}" class="admin-card">
            <div class="admin-icon">📄</div>
            <div class="admin-title">전체 문의</div>
            <div class="admin-desc">모든 문의 이력</div>
        </a>

        <a th:href="@{/admin/qr/print/books}" class="admin-card">
            <div class="admin-icon">📘</div>
            <div class="admin-title">책 QR 코드</div>
            <div class="admin-desc">인쇄 템플릿</div>
        </a>

        <a th:href="@{/admin/qr/print/tables}" class="admin-card">
            <div class="admin-icon">📱</div>
            <div class="admin-title">테이블 QR 코드</div>
            <div class="admin-desc">인쇄 템플릿</div>
        </a>

    </div>

</div>

</body>
</html>
