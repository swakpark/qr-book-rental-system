<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 문의 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="admin-container">

    <!-- 헤더 -->
    <div class="admin-header">
        <h1>
            <span th:if="${viewType == 'pending'}">❓ 미처리 문의</span>
            <span th:if="${viewType == 'all'}">📄 전체 문의</span>
        </h1>

        <a th:href="@{/admin/dashboard}" class="btn-gray small">
            ← 관리자 허브
        </a>
    </div>

    <!-- 문의 없음 -->
    <div th:if="${#lists.isEmpty(inquiries)}" class="card muted">
        <span th:if="${viewType == 'pending'}">
            미처리 문의가 없습니다 🎉
        </span>
        <span th:if="${viewType == 'all'}">
            등록된 문의가 없습니다.
        </span>
    </div>

    <!-- 문의 목록 -->
    <div th:each="inq : ${inquiries}" class="card">

        <div class="admin-inquiry-meta">
            <div><b>문의 ID:</b> <span th:text="${inq.id}"></span></div>
            <div><b>사용자:</b> <span th:text="${inq.user.name}"></span></div>
        </div>

        <div class="admin-inquiry-message">
            <b>문의 내용</b>
            <div class="message-box"
                 th:text="${inq.message}"></div>
        </div>

        <!-- 연체 정보 -->
        <div th:if="${inq.overdue}" class="alert-error">
            ⚠️ 연체
            (<span th:text="${inq.overdueDays}"></span>일 /
            <span th:text="${inq.penaltyAmount}"></span>원)
        </div>

        <div class="admin-inquiry-status">
            상태:
            <span th:text="${inq.resolved ? '처리 완료' : '미처리'}"></span>
        </div>

        <div class="muted">
            문의 접수:
            <strong th:text="${#temporals.format(inq.createdAt, 'yyyy-MM-dd HH:mm')}"></strong>
        </div>

        <!-- 답변 작성 -->
        <div th:if="${!inq.resolved}" class="admin-reply-form">

            <form th:action="@{/admin/inquiries/{id}/reply(id=${inq.id})}"
                  method="post"
                  onsubmit="return confirm('이 답변을 저장하고 문의를 처리 완료할까요?')">

                <textarea name="reply"
                          placeholder="관리자 답변을 입력하세요"
                          required></textarea>

                <button type="submit" class="btn-primary">
                    답변 저장 & 처리 완료
                </button>

            </form>

        </div>

        <!-- 답변 완료 상태 -->
        <div th:if="${inq.resolved and inq.adminReply != null}"
             class="admin-reply-box">

            <b>📢 관리자 답변</b>
            <div class="message-box"
                 th:text="${inq.adminReply}"></div>

            <div class="muted">
                <small th:text="${#temporals.format(inq.resolvedAt, 'yyyy-MM-dd HH:mm')}"></small>
            </div>

        </div>

    </div>

</div>
</body>
</html>
