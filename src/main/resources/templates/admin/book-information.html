<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>도서 정보</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="admin-container">

    <!-- 헤더 -->
    <div class="admin-header">
        <h1>📘 도서 정보</h1>
        <a th:href="@{/admin/view/loans}" class="btn-gray small">
            ← 도서 대여 목록
        </a>
    </div>

    <!-- 도서 기본 정보 -->
    <div class="card">

        <div class="admin-book-title" th:text="${book.title}"></div>

        <div class="muted">
            저자: <span th:text="${book.author}"></span>
        </div>

        <div class="muted">
            대여 가능:
            <span th:text="${book.available ? '가능' : '불가'}"></span>
        </div>

    </div>

    <!-- QR 코드 -->
    <div class="card qr-card">

        <div class="section-title">📱 QR 코드로 바로 열기</div>

        <img class="qr-image"
             th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + ${qrUrl}}"
             alt="도서 QR 코드" />

        <div class="muted small-text">
            QR을 스캔하면 이 도서 페이지로 이동합니다.
        </div>

    </div>

    <!-- 대여 상태 -->
    <div th:if="${loan != null}" class="card">

        <div class="section-title">📦 대여 상태</div>

        <div class="admin-loan-user">
            👤 대여자:
            <span th:text="${loan.user.name}"></span>
        </div>

        <form th:action="@{/admin/books/{id}/force-return(id=${book.id})}"
              method="post"
              class="admin-action-form">

            <button type="submit" class="btn-danger">
                관리자 강제 반납
            </button>

        </form>

    </div>

</div>

</body>
</html>
