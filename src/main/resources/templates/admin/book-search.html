<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>네이버 도서 검색</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="admin-container">

    <!-- 헤더 -->
    <div class="admin-header">
        <h1>🔍 네이버 도서 검색</h1>
        <a th:href="@{/admin/dashboard}" class="back-link">⬅️ 관리자 허브</a>
    </div>

    <!-- 검색 폼 -->
    <div class="card">
        <form method="get"
              action="/admin/books/naver/search"
              class="search-form">

            <input type="text"
                   name="q"
                   placeholder="검색어 입력"
                   th:value="${q}"
                   required>

            <button type="submit" class="btn-primary">
                검색
            </button>

        </form>
    </div>

    <!-- 검색 결과 -->
    <div th:if="${items != null}" class="admin-list">

        <div th:each="book : ${items}" class="admin-row">

            <div class="naver-book-row">

                <img th:src="${book.image}"
                     alt="도서 이미지"
                     class="book-thumb">

                <div class="naver-book-info">

                    <div class="admin-row-title"
                         th:utext="${book.title}"></div>

                    <div class="admin-row-user"
                         th:text="${book.author}"></div>

                    <div class="admin-row-user"
                         th:text="${book.publisher}"></div>

                    <form method="post"
                          action="/admin/books/naver/import"
                          class="naver-import-form">

                        <input type="hidden"
                               name="isbn"
                               th:value="${book.isbn}">

                        <button type="submit"
                                class="btn-primary small">
                            ➕ 등록
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
</body>
</html>
