<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>내 문의 내역</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="container">

    <!-- 헤더 -->
    <div class="card">
        <div class="inquiry-header">
            <a th:href="@{/qr/entry}" class="back-link">⬅️ 홈 화면</a>
        </div>

        <h1>📬 내 문의 내역</h1>

    </div>

    <!-- 문의 없음 -->
    <div th:if="${#lists.isEmpty(inquiries)}" class="card muted">
        아직 문의한 내역이 없습니다.
    </div>

    <!-- 문의 목록 -->
    <div th:each="inq : ${inquiries}" class="card inquiry-card">

        <div class="section-title">문의 내용</div>

        <div class="message-box" th:text="${inq.message}"></div>

        <!-- 연체 표시 -->
        <div th:if="${inq.overdue}" class="alert-error">
            ⚠️ 연체
            (<span th:text="${inq.overdueDays}"></span>일 /
            <span th:text="${inq.penaltyAmount}"></span>원)
        </div>

        <!-- 상태 -->
        <div class="status-line">
            상태:
            <span th:if="${!inq.resolved}" class="badge-waiting">
                ⏳ 답변 대기중
            </span>

            <span th:if="${inq.resolved}" class="badge-done">
                ✅ 답변 완료
            </span>
        </div>

        <!-- 관리자 답변 -->
        <div th:if="${inq.adminReply != null}" class="admin-reply-box">
            <div class="section-title">📢 관리자 답변</div>
            <div th:text="${inq.adminReply}"></div>
            <div class="reply-time"
                 th:text="${#temporals.format(inq.resolvedAt, 'yyyy-MM-dd HH:mm')}">
            </div>
        </div>

    </div>

</div>


</body>
</html>
