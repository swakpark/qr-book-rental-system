<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <h1>📚 도서관 로그인</h1>

        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" name="redirect" th:value="${param.redirect}">

            <label>이메일</label>
            <input type="email"
                   name="email"
                   placeholder="email@example.com"
                   required>

            <label>비밀번호</label>
            <input type="password"
                   name="password"
                   placeholder="비밀번호"
                   required>

            <button type="submit" class="btn-primary">
                로그인
            </button>

            <div th:if="${param.error}" class="auth-error">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>
        </form>

        <div class="auth-hint">
            아직 회원이 아니신가요?
            <a th:href="@{/register(redirect=${param.redirect})}">
                회원가입
            </a>
        </div>

    </div>
</div>

</body>
</html>
