<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <h1>📚 도서관 회원가입</h1>

        <form th:action="@{/register}" method="post" class="auth-form">
            <input type="hidden" name="redirect" th:value="${redirect}" />

            <label>이름</label>
            <input name="name"
                   placeholder="이름"
                   required>

            <label>이메일</label>
            <input name="email"
                   type="email"
                   placeholder="email@example.com"
                   required>

            <label>비밀번호</label>
            <input name="password"
                   type="password"
                   placeholder="비밀번호"
                   required>

            <button type="submit" class="btn-primary">
                회원가입
            </button>
        </form>

        <div class="auth-hint">
            이미 계정이 있나요?
            <a th:href="@{/login(redirect=${param.redirect})}">
                로그인
            </a>
        </div>

    </div>
</div>

</body>
</html>
