<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>도서 대여</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>
<body>

<div class="container">
    <!-- 상단 안내 카드 -->
    <div class="card">
        <h1>📱 QR 도서 페이지</h1>
        <p class="sub-text">
            이 화면에서 대여 또는 반납을 진행합니다.
        </p>

        <!-- 로그인 상태 표시 -->
        <div class="login-info">
            <span th:if="${isLoggedIn}">
                현재 사용자: <b th:text="${user.name}">사용자</b>
            </span>
            <span th:if="${!isLoggedIn}">
                로그인 후 대여할 수 있어요
            </span>
        </div>
    </div>

    <!-- 도서 정보 카드 -->
    <div class="card">
        <div class="book-detail">
            <img th:if="${book.image != null}"
                 th:src="${book.image}"
                 alt="도서 이미지" />
        </div>

        <h2 class="book-title" th:text="${book.title}"></h2>
        <p>저자: <span th:text="${book.author}"></span></p>
        <p class="isbn">ISBN: <span th:text="${book.isbn}"></span></p>

        <!-- 연체 안내 -->
        <div th:if="${overduePolicy != null and !overduePolicy.canBorrow()}"
             class="alert-error">
            ⚠️ 연체 <span th:text="${overduePolicy.overdueDays}"></span>일 ·
            연체료 <span th:text="${overduePolicy.penaltyAmount}"></span>원
        </div>

        <!-- 대여 가능 -->
        <div th:if="${state.name() == 'AVAILABLE'
            and (overduePolicy == null or overduePolicy.canBorrow())}">

            <p class="status available">지금 대여 가능합니다</p>

            <!-- 로그인 상태 -->
            <form th:if="${isLoggedIn}"
                  th:action="@{/qr/books/{id}/{signature}/loan(id=${book.id}, signature=${signature})}"
                  method="post"
                  onsubmit="handleSubmit(this, '대여 처리 중...')">
                <button type="submit" class="btn-primary">대여하기</button>
            </form>
        </div>

        <!-- 대여 중 -->
        <div th:if="${state.name() == 'LOANED'}">

            <p class="status unavailable">현재 대여 중입니다</p>

            <form th:if="${isLoggedIn and loan != null and loan.user.id == user.id}"
                  th:action="@{/qr/books/{id}/{signature}/return(id=${book.id}, signature=${signature})}"
                  method="post"
                  onsubmit="handleSubmit(this, '반납 처리 중...')">
                <button type="submit" class="btn-primary">반납하기</button>
            </form>

            <p class="sub-text">
                반납 후 다시 대여할 수 있습니다.
            </p>
        </div>

        <!-- 로그아웃 -->
        <form th:if="${isLoggedIn}" th:action="@{/logout}" method="post">
            <button type="submit" class="btn-outline">로그아웃</button>
        </form>

        <div class="footer">
            도서 상태에 따라 대여 또는 반납할 수 있습니다.
        </div>
    </div>

    <!-- 로그인 유도 -->
    <div th:if="${!isLoggedIn}" class="login-link">
        <a th:href="@{/login(redirect=${'/qr/books/' + book.id + '/' + signature})}">
            로그인 / 회원가입 →
        </a>
    </div>
</div>

</body>

<script>
function handleSubmit(form, text) {
    const button = form.querySelector("button");
    button.disabled = true;
    button.style.opacity = "0.7";
    button.innerText = text || "처리 중...";
}
</script>
</html>
