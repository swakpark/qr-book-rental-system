<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>도서관 서비스</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>
<div class="container">

    <!-- 상단 + 메뉴 통합 카드 -->
    <div class="card">

        <!-- 타이틀 -->
        <h1>🏛️ 도서관 서비스</h1>

        <div class="muted">
            <span th:if="${user != null}">
                현재 사용자: <b th:text="${user.name}">사용자</b>
            </span>
            <span th:if="${user == null}">
                로그인 후 기능을 이용할 수 있어요!
            </span>
        </div>

        <!-- 관리자 링크 -->
        <a th:if="${isAdmin}"
           th:href="@{/admin/dashboard}"
           class="admin-link">
            🛠 관리자 페이지
        </a>

        <!-- 로그인 상태 -->
        <div th:if="${user != null}" style="margin-top:16px;">
            <form action="/logout" method="post">
                <button type="submit" class="btn-outline">로그아웃</button>
            </form>
        </div>

        <!-- 비로그인 상태 -->
        <div th:if="${user == null}" class="entry-auth">
            <a th:href="@{/login}" class="btn-outline small">로그인</a>
            <a th:href="@{/register}" class="btn-outline small">회원가입</a>
        </div>

        <!-- 주요 기능 -->
        <div class="menu-grid">
            <a th:href="@{/books/search-page}" class="menu-card">
                <div class="menu-icon">🔍</div>
                <div class="menu-title">도서 검색</div>
            </a>

            <a th:href="@{/chat}" class="menu-card">
                <div class="menu-icon">🤖</div>
                <div class="menu-title">도서관 챗봇</div>
            </a>

            <!-- 보조 기능 -->
            <a th:href="@{/qr/loans}" class="menu-card">
                <div class="menu-icon">📄</div>
                <div class="menu-title">대여 목록</div>
            </a>

            <a th:href="@{/help}" class="menu-card">
                <div class="menu-icon">👤</div>
                <div class="menu-title">관리자 문의</div>
            </a>

        </div>

        <div class="footer">
            📌 실제 대여/반납은 도서에 부착된 QR로 진행됩니다.
        </div>

    </div>

    <!-- 로그인 사용자 전용: 내 대여 현황 -->
    <div class="card" th:if="${user != null}">
        <h2>📌 내 대여 현황</h2>

        <div th:if="${#lists.isEmpty(loanViews)}" class="muted">
            현재 대여 중인 도서가 없습니다.
        </div>

        <div th:if="${!#lists.isEmpty(loanViews)}">

            <div class="muted">
                현재 <b th:text="${#lists.size(loanViews)}"></b>권 대여 중입니다.
            </div>

            <div th:each="loan, iter : ${loanViews}"
                 th:if="${iter.index < 2}"
                 class="loan-item">
                📚 <span th:text="${loan.title}"></span>
            </div>

        </div>
    </div>

    <!-- 로그인 사용자 전용: 내 문의 -->
    <div class="card" th:if="${user != null}">
        <h2>📬 내 문의</h2>

        <div th:if="${inquiryCount == 0}" class="muted">
            아직 문의한 내역이 없습니다.
        </div>

        <div th:if="${inquiryCount > 0}">

            문의 <b th:text="${inquiryCount}"></b>건 <br>

            <div th:if="${unreadInquiryCount > 0}"
                 class="alert-error"
                 style="margin-top:10px;">
                🔔 새 답변 <b th:text="${unreadInquiryCount}"></b>건
            </div>

            <a th:href="@{/inquiries/my}" class="btn-secondary">
                문의 내역 보기
            </a>

        </div>
    </div>

</div>
</body>
</html>
