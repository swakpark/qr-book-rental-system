<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>처리 결과</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>
<div class="container">
    <div class="card result-box"
         th:classappend="${errorMessage != null} ? ' error' : ' success'">

        <!-- 제목 -->
        <h1 th:text="${errorTitle != null ? errorTitle : message}">
            처리 결과
        </h1>

        <!-- 에러 메시지 (연체 등) -->
        <p th:if="${errorMessage}" th:text="${errorMessage}"></p>

        <!-- 정상 처리일 때만 책 정보 -->
        <div class="book-title"
             th:if="${book != null}"
             th:text="${book.title}">
        </div>

        <!-- 정상 처리 버튼 -->
        <a th:if="${book != null}"
           class="btn-primary"
           th:href="@{/qr/books/{id}/{signature}(id=${book.id}, signature=${signature})}">
            도서 페이지로 돌아가기
        </a>

        <!-- 연체 시 관리자 문의 -->
        <a th:if="${showAdminLink}"
           href="/help"
           class="btn-outline">
            관리자 문의
        </a>

        <div class="hint" th:if="${autoRedirect}">
            잠시 후 자동으로 이동합니다…
        </div>

    </div>
</div>

<script th:if="${autoRedirect and book != null}" th:inline="javascript">
    setTimeout(function() {
        var bookId = [[${book.id}]];
        var signature = /*[[${signature}]]*/ "";

        window.location.href = "/qr/books/" + bookId + "/" + signature;
    }, 1500);
</script>

</body>
</html>
