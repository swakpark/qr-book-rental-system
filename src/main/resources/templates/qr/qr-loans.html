<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>내 대여 목록</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>
<div class="container">

    <!-- 헤더 카드 -->
    <div class="card">
        <div class="loan-header">
            <h1>📄 내 대여 목록</h1>
            <a th:href="@{/qr/entry}" class="back-link">⬅️ 홈 화면</a>
        </div>
    </div>

    <!-- 대여 없음 -->
    <div th:if="${#lists.isEmpty(loanViews)}" class="card muted">
        현재 대여 중인 도서가 없습니다.
    </div>

    <!-- 대여 목록 -->
    <div th:each="loan : ${loanViews}" class="card">

        <img th:src="${loan.image}" alt="도서 이미지" class="card-thumb"/>

        <div class="muted">
            제목: <span th:text="${loan.title}">도서 제목</span> <br>
            저자: <span th:text="${loan.author}">저자명</span>
        </div>

        <div class="muted">
            반납 기한: <b th:text="${loan.dueDate}"></b>
        </div>

        <!-- 상태 -->
        <div th:if="${loan.daysLeft < 0}" class="loan-status over">
            🚨 연체 중 – 즉시 반납 필요
        </div>

        <div th:if="${loan.daysLeft == 0}" class="loan-status danger">
            ⏰ 오늘까지 반납
        </div>

        <div th:if="${loan.daysLeft > 0 and loan.daysLeft <= 3}" class="loan-status warn">
            ⚠️ 반납 임박
        </div>

        <div th:if="${loan.daysLeft > 3}" class="loan-status safe">
            ✅ 대여 중
        </div>

        <!-- 대여 연장 안내 -->
        <div class="renew-guide">
            <strong>🔖 연장 방법</strong><br>
            - 도서관 챗봇 통해서 <b>대여 연장</b>하세요!<br>
            - <b>한 권당 1번</b> 연장할 수 있어요! (14일 연장)
        </div>
    </div>
</div>
</body>
</html>
