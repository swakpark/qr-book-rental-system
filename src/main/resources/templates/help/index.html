<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 문의</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>

<div class="container">

    <div class="card">

        <div class="inquiry-header">
            <h1>📩 관리자 문의</h1>
            <a th:href="@{/qr/entry}" class="back-link">⬅️ 홈 화면</a>
        </div>

        <!-- 연체 경고 -->
        <div th:if="${overduePolicy != null and !overduePolicy.canBorrow()}"
             class="alert-error">
            <b>⚠️ 연체 상태</b><br>
            연체 <span th:text="${overduePolicy.overdueDays}"></span>일 /
            연체료 <span th:text="${overduePolicy.penaltyAmount}"></span>원
        </div>

        <form method="post" th:action="@{/help/inquiry}" class="inquiry-form">

            <textarea name="message"
                      placeholder="문의 내용을 입력해주세요."
                      required></textarea>

            <button type="submit" class="btn-primary">
                문의 보내기
            </button>

        </form>

    </div>

</div>

</body>
</html>
