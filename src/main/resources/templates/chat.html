<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>도서관 챗봇</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=5)}">
</head>

<body>
<div class="chat-wrapper">

    <!-- 상단 헤더 -->
    <div class="chat-header">
        <a th:href="@{/qr/entry}" class="back-link">⬅️ 홈 화면</a>
        <h2>🤖 챗봇</h2>
    </div>

    <!-- 메시지 영역 -->
    <div id="messages" class="chat-messages"></div>

    <!-- 입력 영역 -->
    <div class="chat-input-area">
        <input id="input" type="text" placeholder="메시지를 입력하세요…" autocomplete="off"/>

        <button class="btn-primary" onclick="sendMessage()">전송</button>
        <button class="btn-gray" onclick="clearChat()">초기화</button>
    </div>

</div>

<script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");

    document.addEventListener("DOMContentLoaded", () => {
        fetch("/api/chat/history")
            .then(res => res.json())
            .then(history => {

                if (!history || history.length === 0) {
                    addMessage(
                        `이렇게 물어보세요 👇
• 내가 빌린 책 알려줘
• 반납 기한 언제야?
• 대여 연장하고 싶어
• 난생처음 R 코딩 & 데이터 분석 있어?`,
                        "bot", false);
                    return;
                }

                history.forEach(msg => {
                    addMessage(msg.message, msg.role, false);
                });
            })
            .catch(() => {
                addMessage("⚠️ 이전 대화를 불러오지 못했어요.", "bot", false);
            });
    });

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";
        input.focus();

        const typing = document.createElement("div");
        typing.className = "chat-message bot";
        typing.innerText = "입력 중…";
        messages.appendChild(typing);
        messages.scrollTop = messages.scrollHeight;

        fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        })
        .then(res => res.json())
        .then(data => {
            typing.remove();
            addMessage(data.reply, "bot");
        })
        .catch(() => {
            typing.remove();
            addMessage("서버와 통신 중 오류가 발생했어요 😢", "bot");
        });
    }

    function addMessage(text, type, save = true) {
        const div = document.createElement("div");
        div.className = "chat-message " + type;
        div.innerHTML = text.replace(/\n/g, '<br>');
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function clearChat() {
        if (!confirm("대화를 초기화할까요?")) return;

        fetch("/api/chat/history", { method: "DELETE" })
            .then(() => {
                messages.innerHTML = "";
                addMessage("대화가 초기화되었습니다 🙂", "bot", false);
            });
    }

    input.addEventListener("keydown", e => {
        if (e.key === "Enter") sendMessage();
    });

</script>

</body>
</html>
