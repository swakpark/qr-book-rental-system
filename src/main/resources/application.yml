spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library?serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:qr-output/

server:
  address: 0.0.0.0
  port: 8080

qr:
  secret: ${QR_SECRET}

jwt:
  secret: ${JWT_SECRET}
  expiration: 1800000
  refresh-expiration: 604800000

naver:
  api:
    base-url: https://openapi.naver.com/v1/search/book.json
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}

openai:
  api:
    key: ${OPENAI_API_KEY}